name: ci

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile key modules
        run: python -m py_compile app/api/routes/catalog.py app/services/catalog_service.py app/repositories/product_repository.py app/services/product_mapper.py app/schemas/catalog.py
